name: Power Platform CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Export Solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.DEV_ENV_URL }}
          tenant-id: ${{ secrets.TENANT_ID }}
          app-id: ${{ secrets.CLIENT_ID }}
          # client-secret: ${{ secrets.CLIENT_SECRET }}
          solution-name: Warranty
          managed: true
          solution-output-file: out/Warranty.zip

      - name: Unpack Solution
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: out/Warranty.zip
          solution-folder: src/Warranty
          solution-type: Managed

      - name: Upload Solution Artifact
        uses: actions/upload-artifact@v4
        with:
          name: solution-package
          path: out/Warranty.zip
